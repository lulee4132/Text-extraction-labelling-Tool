<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>현장 사진 OCR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    .card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; }
    .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    input[type=text], input[type=password] { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
    .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 28px; text-align: center; cursor: pointer; margin-bottom: 16px; }
    .upload-area:hover { border-color: #555; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    button { padding: 9px 20px; border: 1px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; }
    button:hover { background: #f5f5f5; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button.primary { background: #1a6bcc; color: white; border-color: #1a6bcc; }
    button.primary:hover { background: #155bb0; }
    #status { font-size: 14px; color: #555; margin-bottom: 12px; min-height: 20px; }
    progress { width: 100%; height: 8px; margin-bottom: 16px; display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f5f5f5; padding: 8px 10px; text-align: left; font-weight: 500; }
    td { padding: 8px 10px; border-bottom: 1px solid #eee; }
    .gongjong { font-weight: 500; color: #1a6bcc; }
    .file-count { font-size: 13px; color: #888; margin-bottom: 12px; }
    .tip { font-size: 12px; color: #aaa; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>현장 사진 OCR — 공종별 분류</h1>

  <div class="card">
    <div class="label">Anthropic API 키</div>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <p class="tip">키는 브라우저에서만 사용되며 서버로 전송되지 않습니다.</p>
  </div>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <input type="file" id="folderInput" webkitdirectory accept="image/*" style="display:none">
    <p style="margin:0 0 10px">클릭하거나 사진을 드래그해서 업로드</p>
    <button onclick="event.stopPropagation(); document.getElementById('folderInput').click()">
      폴더 통째로 선택
    </button>
  </div>

  <div class="file-count" id="fileCount"></div>

  <div class="btn-row">
    <button class="primary" id="runBtn" onclick="runOCR()" disabled>OCR 실행</button>
    <button id="zipBtn" onclick="downloadZIP()" disabled>공종별 ZIP 다운로드</button>
    <button id="csvBtn" onclick="downloadCSV()" disabled>CSV 다운로드</button>
    <button onclick="resetAll()">초기화</button>
  </div>

  <progress id="progress" max="100" value="0"></progress>
  <div id="status"></div>

  <table id="resultTable" style="display:none">
    <thead>
      <tr>
        <th>#</th><th>파일명</th><th>공사명</th>
        <th>공종</th><th>위치</th><th>내용</th><th>일자</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

<script>
let selectedFiles = [];
let resultData    = [];

function collectFiles(input) {
  const files = Array.from(input.files).filter(f => f.type.startsWith('image/'));
  selectedFiles = [...selectedFiles, ...files];
  document.getElementById('fileCount').textContent = `선택된 사진: ${selectedFiles.length}장`;
  document.getElementById('runBtn').disabled = selectedFiles.length === 0;
  document.getElementById('csvBtn').disabled = true;
  document.getElementById('zipBtn').disabled = true;
  input.value = '';
}

document.getElementById('fileInput').addEventListener('change',   e => collectFiles(e.target));
document.getElementById('folderInput').addEventListener('change', e => collectFiles(e.target));

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function callClaudeAPI(apiKey, base64Image, mediaType) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-client-side-request-allowed': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: mediaType, data: base64Image }
          },
          {
            type: 'text',
            text: `이 사진의 좌하단에 있는 텍스트 박스에서 다음 5가지 항목을 추출해줘.
반드시 아래 JSON 형식으로만 응답하고, 다른 설명은 하지 마.

{
  "공사명": "",
  "공종": "",
  "위치": "",
  "내용": "",
  "일자": ""
}

항목을 찾지 못하면 빈 문자열로 남겨줘.`
          }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || '알 수 없는 오류');
  }

  const data = await response.json();
  const text = data.content[0].text.trim();

  // JSON 파싱
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('JSON 파싱 실패');
  return JSON.parse(match[0]);
}

async function runOCR() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('API 키를 입력해주세요.'); return; }

  resultData = [];
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('resultTable').style.display = 'table';
  document.getElementById('runBtn').disabled = true;
  document.getElementById('csvBtn').disabled = true;
  document.getElementById('zipBtn').disabled = true;

  const progress = document.getElementById('progress');
  const status   = document.getElementById('status');
  progress.style.display = 'block';
  progress.value = 0;

  for (let i = 0; i < selectedFiles.length; i++) {
    const file = selectedFiles[i];
    status.textContent = `처리 중... ${i + 1} / ${selectedFiles.length} — ${file.name}`;
    progress.value = Math.round((i / selectedFiles.length) * 100);

    try {
      const base64    = await toBase64(file);
      const mediaType = file.type || 'image/jpeg';
      const fields    = await callClaudeAPI(apiKey, base64, mediaType);

      resultData.push({ name: file.name, file, ...fields });

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td style="font-size:12px">${file.name}</td>
        <td>${fields['공사명'] || ''}</td>
        <td class="gongjong">${fields['공종'] || '미인식'}</td>
        <td>${fields['위치'] || ''}</td>
        <td>${fields['내용'] || ''}</td>
        <td>${fields['일자'] || ''}</td>
      `;
      document.getElementById('tableBody').appendChild(tr);

    } catch (e) {
      resultData.push({ name: file.name, file, 공사명:'', 공종:'오류', 위치:'', 내용:'', 일자:'' });
      status.textContent = `오류: ${file.name} — ${e.message}`;
    }
  }

  progress.value = 100;
  status.textContent = `완료! 총 ${selectedFiles.length}장 처리됨`;
  document.getElementById('runBtn').disabled = false;
  document.getElementById('csvBtn').disabled = false;
  document.getElementById('zipBtn').disabled = false;
}

async function downloadZIP() {
  const status = document.getElementById('status');
  status.textContent = 'ZIP 생성 중...';

  const zip = new JSZip();

  for (const r of resultData) {
    const folderName = (r['공종'] || '미인식').replace(/[\\/:*?"<>|]/g, '_');
    const buffer = await r.file.arrayBuffer();
    zip.folder(folderName).file(r.name, buffer);
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'photos_by_gongjong.zip'; a.click();
  URL.revokeObjectURL(url);
  status.textContent = 'ZIP 다운로드 완료!';
}

function downloadCSV() {
  const header = '번호,파일명,공사명,공종,위치,내용,일자\n';
  const rows = resultData.map((r, i) => {
    const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';
    return `${i+1},${esc(r.name)},${esc(r['공사명'])},${esc(r['공종'])},${esc(r['위치'])},${esc(r['내용'])},${esc(r['일자'])}`;
  }).join('\n');

  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'ocr_result.csv'; a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  selectedFiles = [];
  resultData    = [];
  document.getElementById('fileCount').textContent = '';
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('resultTable').style.display = 'none';
  document.getElementById('status').textContent = '';
  document.getElementById('progress').style.display = 'none';
  document.getElementById('runBtn').disabled = true;
  document.getElementById('csvBtn').disabled = true;
  document.getElementById('zipBtn').disabled = true;
}
</script>
</body>
</html>
